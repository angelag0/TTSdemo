<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品型錄上架 - AI 圖片標籤辨識 Demo (對齊修正版)</title>
    <style>
        :root {
            --primary-pink: #e91e63; 
            --text-main: #333333;
            --border: #cccccc;
            --ai-bg: #f5f0ff;
            --ai-border: #dcd0ff;
            --ai-text: #5e35b1;
            --text-muted: #666666;
            --error: #e74c3c;
        }

        body {
            font-family: "Microsoft JhengHei", 'Segoe UI', Tahoma, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 850px;
            background: #fff;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-top: 3px solid #e0e0e0;
        }

        .form-row {
            display: flex; 
            margin-bottom: 24px; 
            padding-bottom: 24px; 
            border-bottom: 1px solid #eeeeee;
        }
        .form-row:last-child { border-bottom: none; }

        .form-label {
            width: 140px; 
            text-align: left; 
            padding-top: 6px;
            font-size: 15px; 
            color: var(--text-main);
            flex-shrink: 0; /* 確保標題寬度不會被壓縮 */
        }
        .form-label .required { color: red; margin-right: 4px; }
        
        /* 核心修正：加入 min-width: 0 避免 flex 子元素撐爆父容器 */
        .form-input-group { 
            flex-grow: 1; 
            min-width: 0; 
            width: 100%; 
        }

        /* ----- Radio 與 上傳區塊 ----- */
        .radio-group {
            display: flex; gap: 20px; margin-bottom: 10px; font-size: 15px; align-items: center;
        }
        .radio-label { display: flex; align-items: center; cursor: pointer; color: var(--text-main); }
        .radio-label input[type="radio"] { display: none; }
        .custom-radio {
            width: 16px; height: 16px; border: 2px solid #ccc;
            border-radius: 50%; margin-right: 6px; position: relative;
        }
        .radio-label input[type="radio"]:checked + .custom-radio { border-color: var(--primary-pink); }
        .radio-label input[type="radio"]:checked + .custom-radio::after {
            content: ''; width: 8px; height: 8px; background: var(--primary-pink);
            border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* 強制上傳區塊寬度 100% */
        .upload-dropzone {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border); border-radius: 4px; padding: 16px;
            background: #ffffff; min-height: 80px; display: flex; flex-direction: column;
            justify-content: space-between;
        }
        .upload-prompt { display: flex; align-items: center; gap: 10px; color: #555; font-size: 14px; }
        .btn-select-file {
            background: linear-gradient(to bottom, #ffffff 0%, #e6e6e6 100%);
            border: 1px solid #b3b3b3; border-radius: 3px;
            padding: 4px 12px; cursor: pointer; font-size: 13px; color: #333;
        }
        .uploaded-file-row {
            display: none; background: #f2f2f2; border-radius: 4px; padding: 8px 12px;
            align-items: center; margin-top: 15px; margin-bottom: 15px; position: relative;
        }
        .uploaded-thumbnail {
            width: 40px; height: 40px; border-radius: 4px; object-fit: cover; margin-right: 12px;
        }
        .uploaded-file-info { font-size: 14px; color: #333; }
        .uploaded-file-info .size { color: #888; font-size: 13px; margin-left: 6px; }
        .btn-remove-file {
            position: absolute; right: 12px; color: #999; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .upload-hint { color: #aaaaaa; font-size: 13px; margin-top: 15px; }

        /* ----- 標籤輸入框 (強制寬度與對齊) ----- */
        .tag-input-wrapper {
            width: 100%;
            box-sizing: border-box;
            display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
            border: 1px solid #8cb1d9; padding: 4px 6px; border-radius: 2px;
            min-height: 38px; max-height: 120px; overflow-y: auto; 
            background: white;
        }
        .tag-input-wrapper input {
            border: none; outline: none; flex-grow: 1;
            min-width: 60px; max-width: 100%;
            font-size: 14px; padding: 4px;
        }
        .tag {
            padding: 3px 8px; background: #f0f0f0; border: 1px solid #cccccc;
            border-radius: 2px; font-size: 13px; color: var(--text-main);
            display: inline-flex; align-items: center; gap: 6px;
            white-space: nowrap; /* 避免標籤內部的字被切斷換行 */
        }
        .tag-remove { cursor: pointer; color: #888; font-weight: bold; }
        .tag-remove:hover { color: var(--error); }

        /* 計數器與上限提示 */
        .tag-footer {
            display: flex; justify-content: flex-end; align-items: center;
            gap: 12px; margin-top: 6px;
        }
        .limit-msg {
            color: var(--error); font-size: 12px; display: none;
        }
        .char-counter {
            font-size: 12px; color: var(--text-muted);
        }
        .char-counter.limit-reached { color: var(--error); }

        /* ----- AI 區塊 (強制寬度與對齊) ----- */
        .ai-preview-container {
            width: 100%;
            box-sizing: border-box;
            display: none; margin-top: 12px; border: 1px solid var(--ai-border);
            border-radius: 8px; background: var(--ai-bg); overflow: hidden;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-preview-header {
            background: #ebe0ff; padding: 8px 12px; font-size: 12px;
            font-weight: 600; color: var(--ai-text); display: flex;
            justify-content: space-between; align-items: center;
        }
        .ai-warning-text {
            font-size: 11px; color: #7e57c2; font-weight: normal;
            margin-right: 12px; opacity: 0.8;
        }

        .ai-preview-body { padding: 12px; }

        .ai-preview-actions {
            display: flex; justify-content: flex-end; padding: 0 12px 12px 12px;
        }
        .btn-refresh-clean {
            background: transparent; color: var(--ai-text); border: none;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
            display: flex; align-items: center; gap: 6px; font-weight: 500;
            transition: background 0.2s;
        }
        .btn-refresh-clean:hover { background: rgba(94, 53, 177, 0.08); }

        .loading-state {
            display: none; padding: 20px; text-align: center; color: var(--ai-text); font-size: 13px;
        }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(94, 53, 177, 0.2); border-radius: 50%;
            border-top-color: var(--ai-text); animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* AI 標籤樣式 */
        .ai-tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .ai-tag-suggest {
            padding: 6px 14px; background: white;
            border: 1px solid var(--ai-border); 
            border-radius: 20px; font-size: 13px; color: var(--ai-text);
            cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .ai-tag-suggest:hover {
            background: var(--ai-text); color: white;
        }
        .ai-tag-suggest.used {
            opacity: 0; transform: scale(0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="form-container">
        
        <div class="form-row">
            <div class="form-label"><span class="required">*</span> 產品型錄圖檔</div>
            <div class="form-input-group">
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="img-source" checked>
                        <div class="custom-radio"></div>
                        <span>上傳原始圖檔</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="img-source">
                        <div class="custom-radio"></div>
                        <span>使用AI去背工具</span>
                    </label>
                </div>
                
                <div class="upload-dropzone">
                    <div class="upload-prompt" id="upload-prompt">
                        請把檔案拖拉到此框，或是 
                        <button class="btn-select-file" onclick="simulateUpload()">選擇檔案</button>
                    </div>

                    <div class="uploaded-file-row" id="uploaded-file-row">
                        <img src="https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?auto=format&fit=crop&w=100&q=80" class="uploaded-thumbnail" alt="thumb">
                        <div class="uploaded-file-info">
                            <span>1.webp</span><span class="size">107.3 KB</span>
                        </div>
                        <span class="btn-remove-file" onclick="removeUpload()">×</span>
                    </div>

                    <div class="upload-hint">檔案類型：*.jpg *.jpeg *.png；檔案大小：5 MB；建議尺寸：寬:400px, 高:300px</div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-label">標籤</div>
            <div class="form-input-group">
                
                <div class="tag-input-wrapper" id="main-tag-wrapper">
                    <span class="tag">VR產品 <span class="tag-remove" onclick="removeTag(this)">×</span></span>
                    <input type="text" id="manual-tag-input" placeholder="" onkeypress="handleManualTag(event)">
                </div>
                
                <div class="tag-footer">
                    <span id="tag-limit-msg" class="limit-msg">標籤已達上限</span>
                    <div id="tag-char-count" class="char-counter">1 / 10</div>
                </div>

                <div id="ai-tags-container" class="ai-preview-container">
                    <div class="ai-preview-header">
                        <span id="ai-title">✨ AI 圖像特徵辨識</span>
                        <div>
                            <span class="ai-warning-text">點擊即可加入標籤，AI產出的內容可能會有錯誤，辨識結果僅供參考。</span>
                            <span style="cursor:pointer; opacity: 0.6;" onclick="closeAITags()">✖</span>
                        </div>
                    </div>
                    
                    <div id="ai-loading" class="loading-state">
                        <div class="spinner"></div>
                        <div>AI 正在分析產品圖片...</div>
                    </div>

                    <div id="ai-result-area" style="display:none;">
                        <div class="ai-preview-body">
                            <div class="ai-tags-container" id="ai-suggested-tags">
                                </div>
                        </div>
                        
                        <div class="ai-preview-actions">
                            <button class="btn-refresh-clean" onclick="regenerateAITags()">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="23 4 23 10 17 10"></polyline>
                                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>
                                重新辨識
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const MAX_TAGS = 10;
        
        // 擴充至 10 個標籤
        const tagSets = [
            ["Space", "Galaxy", "Nebula", "Sci-Fi", "Background", "Astronomy", "Universe", "Cosmos", "Digital Art", "Planet"],
            ["VR Headset", "Metaverse", "Gaming", "Virtual Reality", "3D", "Simulation", "Immersive", "Technology", "Cyber", "Future"],
            ["Hardware", "Server", "Data Center", "Cloud Computing", "AI", "Network", "Rackmount", "Performance", "Security", "IoT"]
        ];
        let currentTagSetIndex = 0;

        function updateTagCount() {
            const wrapper = document.getElementById('main-tag-wrapper');
            const tags = wrapper.querySelectorAll('.tag');
            const countDisplay = document.getElementById('tag-char-count');
            const limitMsg = document.getElementById('tag-limit-msg');
            const inputEl = document.getElementById('manual-tag-input');
            const currentCount = tags.length;

            countDisplay.innerText = `${currentCount} / ${MAX_TAGS}`;
            
            if (currentCount >= MAX_TAGS) {
                countDisplay.classList.add('limit-reached');
                limitMsg.style.display = 'inline';
                inputEl.disabled = true;
            } else {
                countDisplay.classList.remove('limit-reached');
                limitMsg.style.display = 'none';
                inputEl.disabled = false;
                inputEl.focus(); 
            }
            return currentCount;
        }

        function simulateUpload() {
            document.getElementById('upload-prompt').style.display = 'none';
            document.getElementById('uploaded-file-row').style.display = 'flex';
            triggerAITags();
        }

        function removeUpload() {
            document.getElementById('uploaded-file-row').style.display = 'none';
            document.getElementById('upload-prompt').style.display = 'flex';
            closeAITags();
        }

        function triggerAITags() {
            const container = document.getElementById('ai-tags-container');
            const loading = document.getElementById('ai-loading');
            const resultArea = document.getElementById('ai-result-area');

            container.style.display = 'block';
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            setTimeout(() => {
                loading.style.display = 'none';
                resultArea.style.display = 'block';
                renderAITags();
            }, 800);
        }

        function regenerateAITags() {
            currentTagSetIndex = (currentTagSetIndex + 1) % tagSets.length;
            triggerAITags();
        }
        
        function closeAITags() {
            document.getElementById('ai-tags-container').style.display = 'none';
        }

        function renderAITags() {
            const container = document.getElementById('ai-suggested-tags');
            container.innerHTML = ''; 
            
            const tags = tagSets[currentTagSetIndex];
            tags.forEach(tagText => {
                const tagEl = document.createElement('div');
                tagEl.className = 'ai-tag-suggest';
                tagEl.innerText = "+ " + tagText;
                
                tagEl.onclick = function() {
                    const cleanText = this.innerText.replace("+ ", "");
                    const isAdded = addTagToMainInput(cleanText);
                    
                    if(isAdded) {
                        this.classList.add('used');
                        setTimeout(() => { this.remove(); }, 200);
                    }
                };
                container.appendChild(tagEl);
            });
        }

        function handleManualTag(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const input = event.target;
                const val = input.value.trim();
                if (val) {
                    addTagToMainInput(val);
                    input.value = '';
                }
            }
        }

        document.getElementById('main-tag-wrapper').addEventListener('click', function() {
            document.getElementById('manual-tag-input').focus();
        });

        function addTagToMainInput(text) {
            const wrapper = document.getElementById('main-tag-wrapper');
            const currentCount = updateTagCount();

            if (currentCount >= MAX_TAGS) {
                return false;
            }

            const existingTags = Array.from(wrapper.querySelectorAll('.tag')).map(el => el.childNodes[0].nodeValue.trim());
            if(existingTags.includes(text)) return false; 

            const tagEl = document.createElement('span');
            tagEl.className = 'tag';
            tagEl.innerHTML = `${text} <span class="tag-remove" onclick="removeTag(this)">×</span>`;
            
            const inputEl = document.getElementById('manual-tag-input');
            wrapper.insertBefore(tagEl, inputEl);
            
            updateTagCount();
            return true;
        }

        function removeTag(element) {
            element.parentElement.remove();
            updateTagCount();
        }
        
        updateTagCount();
    </script>
</body>
</html>
